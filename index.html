<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    :root {
        --bg-dark: #050a14;
        --accent-blue: #00d2ff;
        --accent-purple: #9d50bb;
        --glass: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.15);
    }

    body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f2f5; }

    /* AI Launcher Button */
    #ai-launcher {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 65px;
        height: 65px;
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
        z-index: 10000;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #ai-launcher:hover { transform: scale(1.1) rotate(10deg); }
    #ai-launcher i { color: white; font-size: 28px; }

    /* Chat Window Styling */
    #ai-chat-box {
        position: fixed;
        bottom: 110px;
        right: 30px;
        width: 380px;
        height: 580px;
        background: rgba(5, 10, 20, 0.95);
        backdrop-filter: blur(25px);
        border: 1px solid var(--glass-border);
        border-radius: 25px;
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 10000;
        box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        animation: chatFadeIn 0.5s ease;
    }

    @keyframes chatFadeIn {
        from { opacity: 0; transform: translateY(50px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Header */
    .ai-header {
        padding: 25px;
        background: linear-gradient(to right, rgba(0,210,255,0.1), rgba(157,80,187,0.1));
        border-bottom: 1px solid var(--glass-border);
        text-align: center;
    }

    .ai-header img { width: 50px; filter: drop-shadow(0 0 10px var(--accent-blue)); }
    .ai-header h3 { color: #fff; margin: 10px 0 5px; font-size: 19px; letter-spacing: 1px; }
    .ai-header p { color: var(--accent-blue); font-size: 12px; margin: 0; font-weight: 600; text-transform: uppercase; }

    /* Messages Display */
    #ai-messages {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .bubble {
        max-width: 85%;
        padding: 14px 18px;
        border-radius: 18px;
        font-size: 14.5px;
        line-height: 1.6;
        position: relative;
    }

    .bot-bubble {
        background: var(--glass);
        color: #e0e0e0;
        border: 1px solid var(--glass-border);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .user-bubble {
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* Professional Link Cards */
    .action-card {
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        padding: 12px;
        margin-top: 10px;
        border: 1px solid rgba(0,210,255,0.3);
    }

    .btn-link {
        display: block;
        text-align: center;
        padding: 10px;
        background: var(--accent-blue);
        color: #000 !important;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 700;
        margin-top: 8px;
        transition: 0.3s;
    }

    .btn-link:hover { background: #fff; transform: translateY(-2px); }

    /* Input Area */
    .ai-input-container {
        padding: 20px;
        background: rgba(0,0,0,0.2);
        display: flex;
        gap: 10px;
    }

    #user-query {
        flex: 1;
        background: var(--glass);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 12px 15px;
        color: #fff;
        outline: none;
    }

    #send-query {
        background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
        border: none;
        width: 50px;
        border-radius: 12px;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    #send-query:hover { opacity: 0.8; }

    /* Custom Scrollbar */
    #ai-messages::-webkit-scrollbar { width: 5px; }
    #ai-messages::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
</style>

<div id="ai-chat-box">
    <div class="ai-header">
        <i class="fas fa-shield-halved" style="font-size: 30px; color: var(--accent-blue);"></i>
        <h3>জনতার অনলাইন প্রেস ক্লাব</h3>
        <p><span style="color: #00ff00;">●</span> AI অ্যাসিস্ট্যান্ট অনলাইন</p>
    </div>
    
    <div id="ai-messages">
        <div class="bubble bot-bubble">
            স্বাগতম! আমি আপনার ডিজিটাল জার্নালিজম ক্যারিয়ারের গাইড। আপনি কীভাবে সাহায্য পেতে পারেন?
        </div>
    </div>

    <div class="ai-input-container">
        <input type="text" id="user-query" placeholder="এখানে লিখুন...">
        <button id="send-query"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<div id="ai-launcher">
    <i class="fas fa-bolt"></i>
</div>

<script>
    const launcher = document.getElementById('ai-launcher');
    const chatBox = document.getElementById('ai-chat-box');
    const sendBtn = document.getElementById('send-query');
    const userInput = document.getElementById('user-query');
    const msgContainer = document.getElementById('ai-messages');

    let chatStep = 0;

    launcher.onclick = () => {
        chatBox.style.display = chatBox.style.display === 'flex' ? 'none' : 'flex';
    };

    function botReply(html) {
        const div = document.createElement('div');
        div.className = 'bubble bot-bubble';
        div.innerHTML = html;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function userReply(text) {
        const div = document.createElement('div');
        div.className = 'bubble user-bubble';
        div.innerText = text;
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    sendBtn.onclick = () => {
        const val = userInput.value.trim();
        if(!val) return;

        userReply(val);
        userInput.value = '';
        chatStep++;

        setTimeout(() => {
            if(chatStep === 1) {
                botReply(`
                    <b>🚀 সংবাদ আপলোড করার নিয়ম:</b><br>
                    সিস্টেমটি ব্যবহার করা অত্যন্ত সহজ। নিচে দেওয়া লিংকে ক্লিক করে লগইন করুন এবং টিউটোরিয়াল ভিডিওটি দেখুন।<br>
                    <div class="action-card">
                        <a href="https://www.jonotaronlinepresscloub.com/signin/" class="btn-link">লগইন ড্যাশবোর্ড</a>
                        <a href="https://youtu.be/nTB28qtbwdk?si=0BV6ZuHV3gX8ez3O" class="btn-link" style="background: #ff0000; color: #fff !important;"><i class="fab fa-youtube"></i> ভিডিও গাইড দেখুন</a>
                    </div>
                `);
            } else {
                botReply(`
                    <div style="color: #ff3e3e; font-weight: bold; border-bottom: 1px solid rgba(255,0,0,0.2); padding-bottom: 5px; margin-bottom: 10px;">
                        ⚠️ অত্যন্ত গুরুত্বপূর্ণ নোটিশ
                    </div>
                    <b>Dear member, thank you for receiving the parcel.</b> To learn how to upload news, please first click on this link and log in:<br>
                    <a href="https://www.jonotaronlinepresscloub.com/signin/" style="color: var(--accent-blue);">লগইন করুন এখানে</a><br><br>
                    সম্পূর্ণ নির্দেশনার জন্য এই টিউটোরিয়াল ভিডিওটি মনোযোগ দিয়ে দেখুন:<br>
                    <a href="https://youtu.be/nTB28qtbwdk?si=0BV6ZuHV3gX8ez3O" style="color: #ff3e3e;">https://youtu.be/nTB28qtbwdk</a><br><br>
                    পার্সেলটি দ্রুত গ্রহণ না করলে আপনার আইডি ও ড্যাশবোর্ড নিষ্ক্রিয় হয়ে যেতে পারে। কোনো সমস্যায় আমাদের WhatsApp-এ যোগাযোগ করুন।
                `);
            }
        }, 1000);
    };

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
</script>
