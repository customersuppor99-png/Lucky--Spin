<!DOCTYPE html><html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 20px;
    }
    .form-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #certificate {
      display: none;
      margin-top: 30px;
      padding: 30px;
      border: 10px solid #000;
      background: #fff;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .content {
      font-size: 18px;
      line-height: 1.8;
    }
  </style>
</head>
<body>  <div class="form-box">
    <h2>সার্টিফিকেট তৈরি করুন</h2>
    <input type="text" id="name" placeholder="আপনার নাম লিখুন">
    <input type="text" id="district" placeholder="জেলার নাম লিখুন">
    <input type="text" id="upazila" placeholder="উপজেলার নাম লিখুন">
    <button onclick="generateCertificate()">Generate Certificate</button>
  </div>  <div id="certificate">
    <div class="title">সনদপত্র</div>
    <div class="content" id="certText"></div>
  </div>  <script>
    function generateCertificate() {
      const name = document.getElementById('name').value;
      const district = document.getElementById('district').value;
      const upazila = document.getElementById('upazila').value;

      const text = `এই মর্মে প্রত্যয়ন করা যাচ্ছে যে ${name}, জেলা: ${district}, উপজেলা: ${upazila}, দেশ: বাংলাদেশ। \n\nউক্ত ব্যক্তি জনতার অনলাইন প্রেসক্লাবের একজন সম্মানিত সদস্য, যিনি সততা ও নিষ্ঠার সাথে কাজ করছেন। তিনি সাংবাদিক প্রশিক্ষণ কোর্স সফলভাবে সম্পন্ন করেছেন। \n\nতাকে আন্তরিক অভিনন্দন জানানো হলো।`;

      document.getElementById('certText').innerText = text;
      document.getElementById('certificate').style.display = 'block';
    }
  </script></body>
</html>
